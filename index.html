<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JISプラスチック・ゴム試験 早見検索</title>
<style>
:root{
  --paper:#F6F6F2;
  --card:#FFFFFF;
  --ink:#22293B;
  --sub:#5B6373;
  --navy:#24365E;
  --navy-soft:#E8ECF5;
  --green:#0E7C66;
  --green-soft:#E4F1EC;
  --amber:#9A6200;
  --amber-soft:#FBF1DC;
  --line:#D8DAD2;
  --mono:"SFMono-Regular","Consolas","Menlo",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;
  font-size:14px;line-height:1.65;
}
header{
  background:var(--navy);color:#fff;
  padding:14px 20px 12px;
  position:sticky;top:0;z-index:20;
  box-shadow:0 2px 6px rgba(0,0,0,.18);
}
.hd-top{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;max-width:1080px;margin:0 auto}
h1{font-size:17px;font-weight:700;letter-spacing:.04em}
.hd-sub{font-size:11px;opacity:.75}
.hd-controls{max-width:1080px;margin:10px auto 0;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
#q{
  flex:1;min-width:220px;
  padding:8px 12px;border:none;border-radius:6px;
  font-size:14px;font-family:inherit;
  background:#fff;color:var(--ink);
}
#q:focus{outline:2px solid #7FA3E8}
.seg{display:flex;border:1px solid rgba(255,255,255,.4);border-radius:6px;overflow:hidden}
.seg button{
  background:transparent;color:#fff;border:none;
  padding:7px 14px;font-size:13px;cursor:pointer;font-family:inherit;
  border-right:1px solid rgba(255,255,255,.25);
}
.seg button:last-child{border-right:none}
.seg button.on{background:#fff;color:var(--navy);font-weight:700}
main{max-width:1080px;margin:0 auto;padding:18px 20px 80px}
.count{font-size:12px;color:var(--sub);margin:2px 0 12px}
.sec-label{
  font-size:12px;font-weight:700;color:var(--sub);
  letter-spacing:.14em;margin:22px 0 10px;
  display:flex;align-items:center;gap:10px;
}
.sec-label::after{content:"";flex:1;height:1px;background:var(--line)}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:8px;
  margin-bottom:14px;overflow:hidden;
  scroll-margin-top:120px;
}
.card.hit-flash{animation:flash 1.6s ease-out}
@keyframes flash{0%{box-shadow:0 0 0 3px #F0B429}100%{box-shadow:0 0 0 0 transparent}}
.card-hd{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:10px 14px;cursor:pointer;user-select:none;
}
.card-hd:hover{background:#FAFAF7}
.badge{
  font-family:var(--mono);font-size:11.5px;font-weight:600;
  padding:2px 8px;border-radius:4px;white-space:nowrap;
}
.t-badge{background:var(--navy-soft);color:var(--navy);border:1px solid #B9C6E2}
.m-badge{background:var(--green-soft);color:var(--green);border:1px solid #ABD3C6}
.r-badge{background:var(--amber-soft);color:var(--amber);border:1px solid #E3C98E}
.card-title{font-size:15px;font-weight:700}
.card-iso{font-size:11.5px;color:var(--sub);font-family:var(--mono)}
.chev{margin-left:auto;color:var(--sub);font-size:12px;transition:transform .15s}
.card.open .chev{transform:rotate(90deg)}
.card-body{display:none;padding:4px 16px 16px;border-top:1px dashed var(--line)}
.card.open .card-body{display:block}

.blk{margin-top:12px}
.blk-t{
  font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.1em;
  margin-bottom:5px;
}
table{border-collapse:collapse;width:100%;font-size:13px}
td,th{border:1px solid var(--line);padding:5px 10px;text-align:left;vertical-align:top}
th{background:#F3F4EF;font-weight:600;white-space:nowrap;width:11em}
td .v{font-family:var(--mono);font-size:12.5px}
.note{
  font-size:12.5px;color:#4A4033;background:var(--amber-soft);
  border-left:3px solid var(--amber);padding:7px 10px;border-radius:0 5px 5px 0;
  margin-top:10px;
}
.links{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.lk{
  font-size:12px;padding:3px 10px;border-radius:14px;cursor:pointer;border:1px solid;
  background:#fff;font-family:inherit;
}
.lk.to-mat{color:var(--green);border-color:#ABD3C6}
.lk.to-mat:hover{background:var(--green-soft)}
.lk.to-test{color:var(--navy);border-color:#B9C6E2}
.lk.to-test:hover{background:var(--navy-soft)}
.fig{
  background:#FBFBF8;border:1px solid var(--line);border-radius:6px;
  padding:8px 10px;margin-top:6px;overflow-x:auto;
}
.fig svg{display:block;max-width:100%}
.fig-cap{font-size:11px;color:var(--sub);margin-top:2px}
.props{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.prop{
  background:#F3F4EF;border:1px solid var(--line);border-radius:5px;
  padding:4px 10px;font-size:12.5px;
}
.prop b{font-family:var(--mono);font-weight:600;font-size:12.5px}
.prop span{color:var(--sub);font-size:11px;display:block;line-height:1.2}
.empty{
  text-align:center;color:var(--sub);padding:50px 0;font-size:14px;
}
.tools{display:flex;gap:8px;margin-bottom:10px}
.tools button{
  background:#fff;border:1px solid var(--line);border-radius:5px;
  padding:4px 12px;font-size:12px;cursor:pointer;color:var(--sub);font-family:inherit;
}
.tools button:hover{background:#F3F4EF}

/* クイックインデックス */
.idx{
  background:var(--card);border:1px solid var(--line);border-radius:8px;
  padding:12px 14px 14px;margin-bottom:16px;
}
.idx-hint{font-size:11.5px;color:var(--sub);margin-bottom:10px;line-height:1.5}
.idx-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px}
@media(max-width:640px){.idx-cols{grid-template-columns:1fr}}
.idx-grp{margin-bottom:10px}
.idx-grp:last-child{margin-bottom:0}
.idx-h{
  font-size:11px;font-weight:700;letter-spacing:.1em;
  color:var(--sub);margin-bottom:6px;
  display:flex;align-items:center;gap:8px;
}
.idx-h::before{content:"";width:3px;height:12px;border-radius:2px;background:var(--navy)}
.idx-h.rub::before{background:var(--amber)}
.idx-chips{display:flex;flex-wrap:wrap;gap:6px}
.idx-chip{
  font-size:12.5px;padding:4px 11px;border-radius:15px;cursor:pointer;
  border:1px solid var(--line);background:#fff;color:var(--ink);
  font-family:inherit;line-height:1.35;transition:background .1s,border-color .1s;
}
.idx-chip:hover{background:var(--navy-soft);border-color:#B9C6E2}
.idx-chip.mat:hover{background:var(--green-soft);border-color:#ABD3C6}
.idx-chip.rub:hover{background:var(--amber-soft);border-color:#E3C98E}
.idx-chart{
  margin-top:2px;font-size:12.5px;padding:4px 12px;border-radius:15px;cursor:pointer;
  border:1px solid #B9C6E2;background:var(--navy-soft);color:var(--navy);
  font-weight:600;font-family:inherit;
}
.idx-chart:hover{background:#DCE4F3}

/* 上に戻る */
#toTop{
  position:fixed;right:18px;bottom:18px;z-index:30;
  width:44px;height:44px;border-radius:50%;
  border:1px solid var(--line);background:#fff;color:var(--navy);
  font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.16);
  display:none;align-items:center;justify-content:center;
}
#toTop:hover{background:var(--navy-soft)}
#toTop.show{display:flex}

mark{background:#FCE58A;padding:0 1px;border-radius:2px}
footer{max-width:1080px;margin:0 auto;padding:0 20px 30px;font-size:11px;color:var(--sub)}
@media(max-width:640px){
  th{width:8em;white-space:normal}
  main{padding:14px 12px 60px}
}
@media print{
  header{position:static}
  .card-body{display:block!important}
  .tools,.seg,.idx,#toTop{display:none}
}
</style>
</head>
<body>

<header>
  <div class="hd-top">
    <h1>JIS プラスチック・ゴム試験 早見検索</h1>
    <span class="hd-sub">試験片形状・測定条件リファレンス（オフライン・単一ファイル）</span>
  </div>
  <div class="hd-controls">
    <input id="q" type="search" placeholder="検索：試験名 / JIS番号 / 材料名（例: K 7171、曲げ、PP、K 6251、EPDM、硬さ）" autocomplete="off">
    <div class="seg" id="seg">
      <button data-v="all" class="on">すべて</button>
      <button data-v="mat">材料から</button>
      <button data-v="test">試験方法から</button>
      <button data-v="chart">グラフ</button>
    </div>
  </div>
</header>

<main>
  <div class="count" id="count"></div>
  <div class="tools">
    <button id="openAll">すべて展開</button>
    <button id="closeAll">すべて閉じる</button>
  </div>
  <div id="idx"></div>
  <div id="list"></div>
</main>

<button id="toTop" title="上に戻る" aria-label="上に戻る">▲</button>

<footer>
  ※ 本ツールは実務上の早見用の要約です。数値・寸法・条件の正式な適用にあたっては、必ず最新版の該当JIS/ISO規格原文を確認してください。代表値（Tm・Tg・密度など）はグレードにより変動します。ゴムの数値は加硫系・配合（カーボンブラック量等）で特に大きく変動します。
</footer>

<script>
"use strict";

/* ================= データ：試験方法 ================= */
const TESTS = [
{
 id:"tensile", name:"引張特性", jis:"JIS K 7161-1 / -2", iso:"ISO 527-1 / -2", 
 kw:"ひっぱり tensile 引張り 弾性率 降伏 破断 ダンベル 多目的試験片 ヤング率 ポアソン比",
 specimen:{label:"多目的試験片 1A形（射出成形）/ 1B形（機械加工）", fig:"dumbbell",
  rows:[
   ["全長","≥170 mm（1A）/ ≥150 mm（1B）"],
   ["平行部の幅 b₁","10.0 ± 0.2 mm"],
   ["厚さ h","4.0 ± 0.2 mm"],
   ["標線間距離 L₀","75 mm（1A）/ 50 mm（1B）"],
   ["つかみ具間距離 L","115 mm（1A）/ 115 mm（1B）目安"]
  ]},
 cond:[
  ["試験速度（弾性率）","1 mm/min"],
  ["試験速度（強さ・伸び）","5 / 50 mm/min など材料区分による（延性材料は50が代表的）"],
  ["引張弾性率の算出","ひずみ 0.05〜0.25 % 区間の割線または回帰"],
  ["ひずみ測定","伸び計・ひずみゲージ推奨（クロスヘッド変位のみは要コンプライアンス配慮）"],
  ["状態調節・試験雰囲気","23 ± 2 ℃ / 50 ± 10 %RH（JIS K 7100）"]
 ],
 note:"弾性率をクロスヘッド変位から求める場合は装置コンプライアンスの影響が大きい。降伏を示す材料は降伏応力を「引張強さ」として報告する場合があるため、応力の定義（降伏/破断/最大）を明記する。",
 mats:["pp","pe","ps","abs","pmma","pc","pa6","pa66","pom","pbt","pet","pvc","gf","recycle","peek","lcp"]
},
{
 id:"film-tensile", name:"引張特性（フィルム・シート）", jis:"JIS K 7127", iso:"ISO 527-3",
 kw:"フィルム シート 短冊 引張 film",
 specimen:{label:"短冊形試験片（1B形ダンベルも可）", fig:"strip",
  rows:[
   ["形状","短冊形（2号形など）：幅 10〜25 mm × 長さ ≥150 mm"],
   ["厚さ","≤1 mm（フィルム・シート対象）"],
   ["つかみ具間距離","100 mm（短冊の代表例）"]
  ]},
 cond:[
  ["試験速度","5〜500 mm/min（材料・目的により選択。伸びの大きいフィルムは200〜500）"],
  ["厚さ測定","各試験片で実測（マイクロメータ）し断面積算出"],
  ["方向性","MD / TD 両方向で採取・報告"]
 ],
 note:"フィルムは異方性（MD/TD）とつかみ部での滑り・切れに注意。エアチャック等の使用やタブ補強が有効。",
 mats:["pp","pe","pet"]
},
{
 id:"flex", name:"曲げ特性（3点曲げ）", jis:"JIS K 7171", iso:"ISO 178",
 kw:"曲げ まげ flexural 3点曲げ たわみ 曲げ弾性率 曲げ強さ コンプライアンス",
 specimen:{label:"推奨試験片（多目的試験片の中央平行部から切り出し可）", fig:"bar",
  rows:[
   ["寸法","長さ 80 × 幅 10 × 厚さ 4 mm"],
   ["支点間距離（スパン）L","(16 ± 1) × h → 標準 64 mm"],
   ["圧子半径 R₁","5.0 ± 0.2 mm"],
   ["支持台半径 R₂","5.0 ± 0.2 mm（h > 3 mm）/ 2.0 ± 0.2 mm（h ≤ 3 mm）"]
  ]},
 cond:[
  ["試験速度","2 mm/min（標準・弾性率測定）。強さ測定はひずみ速度1 %/minに相当する速度を選択可"],
  ["曲げ弾性率の算出","ひずみ 0.05〜0.25 % 区間"],
  ["測定終点","破壊、または曲げひずみ 3.5 %（そこまでに破壊しない場合）"],
  ["たわみ測定","中央たわみ。クロスヘッド変位使用時はコンプライアンス補正を考慮"]
 ],
 note:"曲げ弾性率はたわみの小さい領域を使うため、装置コンプライアンス・接触部のなじみ（トー）の影響が特に大きい。たわみ計の使用または補正の実施を推奨。",
 mats:["pp","pe","ps","abs","pmma","pc","pa6","pa66","pom","pbt","pet","pvc","gf","recycle","peek","lcp"]
},
{
 id:"compress", name:"圧縮特性", jis:"JIS K 7181", iso:"ISO 604",
 kw:"圧縮 compression 圧縮弾性率 圧縮強さ",
 specimen:{label:"直方体試験片（用途で寸法が異なる）", fig:null,
  rows:[
   ["弾性率測定用","50 × 10 × 4 mm（座屈を避けつつ標線間を確保）"],
   ["強さ測定用","10 × 10 × 4 mm"]
  ]},
 cond:[
  ["試験速度（弾性率）","1 mm/min"],
  ["試験速度（強さ）","1〜5 mm/min（材料区分による）"],
  ["端面","平行・平滑に仕上げる（偏心荷重を避ける）"]
 ],
 note:"細長い試験片は座屈しやすい。弾性率用と強さ用で試験片寸法が異なる点に注意。",
 mats:["pp","pc","pom","gf"]
},
{
 id:"charpy", name:"シャルピー衝撃強さ", jis:"JIS K 7111-1", iso:"ISO 179-1",
 kw:"シャルピー charpy 衝撃 ノッチ impact 耐衝撃",
 specimen:{label:"ノッチ付き試験片（呼称例：ISO 179-1/1eA）", fig:"notch",
  rows:[
   ["寸法","長さ 80 × 幅 10 × 厚さ 4 mm"],
   ["ノッチ","A形：先端半径 0.25 ± 0.05 mm、ノッチ底残り幅 8.0 ± 0.2 mm"],
   ["支点間距離","62 mm"],
   ["打撃方向","エッジワイズ（e）が標準。フラットワイズ（f）もあり"]
  ]},
 cond:[
  ["ハンマー容量","吸収エネルギーが容量の 10〜80 % に入るよう選択（0.5〜50 J）"],
  ["打撃速度","2.9 m/s（容量 ≤5 J）/ 3.8 m/s（容量 ≥7.5 J）"],
  ["ノッチ加工","ブローチ・フライス等。加工発熱・むしれに注意"],
  ["結果表示","kJ/m²（ノッチ底断面積基準）＋破壊形態（C/H/P/N）"]
 ],
 note:"ノッチ品質（先端半径・仕上げ）が結果を大きく左右する。GF強化材や再生材はノッチ感度・ばらつきが大きく、破壊形態の記録が重要。",
 mats:["pp","pe","ps","abs","pmma","pc","pa6","pa66","pom","pbt","pvc","gf","recycle","peek","lcp"]
},
{
 id:"izod", name:"アイゾット衝撃強さ", jis:"JIS K 7110", iso:"ISO 180",
 kw:"アイゾット izod 衝撃 ノッチ impact",
 specimen:{label:"ノッチ付き試験片（片持ち固定）", fig:"notch",
  rows:[
   ["寸法","長さ 80 × 幅 10 × 厚さ 4 mm"],
   ["ノッチ","A形：先端半径 0.25 mm、残り幅 8 mm"],
   ["固定","ノッチ側を上にして下半分をバイスで片持ち固定、ノッチ面を打撃側に向ける"]
  ]},
 cond:[
  ["ハンマー容量","吸収エネルギーが容量の 10〜80 % に入るよう選択"],
  ["結果表示","kJ/m²（ノッチ底断面積基準）"]
 ],
 note:"シャルピー（両端支持・中央打撃）とアイゾット（片持ち・自由端打撃）は値が一致しない。データシート比較時は方式の確認を。",
 mats:["pp","abs","pc","pa6","pa66","pom","pbt","gf","peek","lcp"]
},
{
 id:"hdt", name:"荷重たわみ温度（HDT）", jis:"JIS K 7191-1 / -2", iso:"ISO 75-1 / -2",
 kw:"HDT 荷重たわみ温度 熱変形温度 耐熱 deflection",
 specimen:{label:"直方体試験片（フラットワイズ負荷が標準）", fig:"bar",
  rows:[
   ["寸法","長さ 80 × 幅 10 × 厚さ 4 mm"],
   ["支点間距離","64 mm（フラットワイズ）"]
  ]},
 cond:[
  ["曲げ応力","A法：1.80 MPa / B法：0.45 MPa / C法：8.00 MPa"],
  ["昇温速度","120 ℃/h（2 ℃/min）"],
  ["判定","規定たわみ量（4 mm厚フラットワイズで 0.34 mm ＝ ひずみ0.2 %相当）到達温度"],
  ["熱媒","シリコーン油などの伝熱媒体に浸漬"]
 ],
 note:"結晶性樹脂はA法（1.80 MPa）でTgとTmの間の値になりやすく、GF強化で大幅に上昇する。非晶性樹脂はTg近傍の値。アニール処理の有無で変わるため成形履歴を記録。",
 mats:["pp","pe","ps","abs","pmma","pc","pa6","pa66","pom","pbt","pet","pvc","gf","peek","lcp"]
},
{
 id:"vicat", name:"ビカット軟化温度（VST）", jis:"JIS K 7206", iso:"ISO 306",
 kw:"ビカット vicat 軟化温度 軟化点 耐熱",
 specimen:{label:"平板状試験片", fig:null,
  rows:[
   ["寸法","厚さ 3〜6.5 mm、幅・長さ ≥10 mm"],
   ["薄い場合","2枚重ねて 3 mm 以上とすることが可能（同一材料）"]
  ]},
 cond:[
  ["針","先端断面積 1 mm² の円形フラット圧子"],
  ["荷重","A法：10 N / B法：50 N"],
  ["昇温速度","50 ℃/h または 120 ℃/h（→ A50 / A120 / B50 / B120）"],
  ["判定","針が 1 mm 侵入した温度"]
 ],
 note:"非晶性樹脂の耐熱指標として常用（B50が代表的）。結晶性樹脂ではTm直下まで高い値が出るため、HDTとの併記が実用的。",
 mats:["pe","ps","abs","pmma","pc","pvc","pom"]
},
{
 id:"mfr", name:"メルトマスフローレイト（MFR / MVR）", jis:"JIS K 7210-1", iso:"ISO 1133-1",
 kw:"MFR MVR メルトフローレート メルトインデックス MI 流動性 溶融",
 specimen:{label:"ペレット・粉末・粉砕片（成形品からの切り出し粉砕も可）", fig:"mfr",
  rows:[
   ["ダイ","内径 2.095 ± 0.005 mm × 長さ 8.000 ± 0.025 mm"],
   ["シリンダー内径","9.550 ± 0.007 mm"],
   ["試料量","3〜8 g 程度（MFR値により調整）"]
  ]},
 cond:[
  ["温度・荷重","材料別に規定（下記の材料カード参照）。例：PP 230 ℃/2.16 kg、PE 190 ℃/2.16 kg"],

const $ = s => document.querySelector(s);
const norm = s => (s||"").toLowerCase()
  .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0))
  .replace(/[ぁ-ん]/g, c => String.fromCharCode(c.charCodeAt(0)+0x60)) // ひらがな→カタカナ
  .replace(/\s+/g,"");
const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function testHay(t){
  return norm([t.name,t.jis,t.iso,t.kw,t.note,
    t.specimen.label, t.specimen.rows.flat().join(" "),
    t.cond.flat().join(" ")].join(" "));
}
function matHay(m){
  return norm([m.name,m.abbr,m.kw,m.note,
    m.props.flat().join(" "),
    (MOLD[m.id]||[]).flat().join(" "),
    (IR[m.id]||[]).flat().join(" "), "IR FTIR 赤外 ピーク",
    (IDENT[m.id]||[]).flat().join(" "), "見分け方 判別 同定 燃焼 浮沈",
    m.conds.map(c=>(testById[c[0]]?.name||"")+" "+c[1]).join(" ")].join(" "));
}

function hl(text){
  if(!query) return esc(text);
  // 元クエリ語（正規化前の生の語）で単純ハイライト
  let out = esc(text);
  for(const w of rawWords){
    if(w.length<1) continue;
    try{
      const re = new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");
      out = out.replace(re, m=>`<mark>${m}</mark>`);
    }catch(e){}
  }
  return out;
}

function niceMax(v){
  const p = Math.pow(10, Math.floor(Math.log10(v)));
  for(const m of [1,1.5,2,2.5,3,4,5,6,8,10]) if(m*p >= v) return m*p;
  return 10*p;
}
function fmtNum(v){ return (Math.round(v*100)/100).toString(); }

function rangeChart(c){
  const L=170, R=70, ROWH=27, TOP=26, W=720;
  const n=c.rows.length, H=TOP+n*ROWH+14;
  const xmax=niceMax(Math.max(...c.rows.map(r=>r[3])));
  const x=v=>L+(W-L-R)*v/xmax;
  let g="";
  // 目盛
  const ticks=5;
  for(let i=0;i<=ticks;i++){
    const v=xmax*i/ticks, xx=x(v);
    g+=`<line x1="${xx}" y1="${TOP-6}" x2="${xx}" y2="${H-12}" stroke="#E3E5DD" stroke-width="1"/>`;
    g+=`<text x="${xx}" y="${TOP-10}" font-size="10" text-anchor="middle" fill="#5B6373">${fmtNum(v)}</text>`;
  }
  g+=`<text x="${W-R+8}" y="${TOP-10}" font-size="10" fill="#5B6373">${c.unit}</text>`;
  // バー
  c.rows.forEach((r,i)=>{
    const [name,id,lo,hi]=r, y=TOP+i*ROWH+ROWH/2;
    g+=`<text x="${L-8}" y="${y+4}" font-size="11.5" text-anchor="end" fill="#22293B" data-go="m-${id}" style="cursor:pointer" text-decoration="underline" opacity=".9">${name}</text>`;
    if(hi>lo){
      g+=`<rect x="${x(lo)}" y="${y-6}" width="${Math.max(x(hi)-x(lo),2)}" height="12" rx="6" fill="#24365E" opacity=".82"/>`;
      g+=`<text x="${x(hi)+6}" y="${y+4}" font-size="10.5" fill="#5B6373" font-family="var(--mono)">${fmtNum(lo)}〜${fmtNum(hi)}</text>`;
    }else{
      g+=`<circle cx="${x(lo)}" cy="${y}" r="5.5" fill="#24365E" opacity=".85"/>`;
      g+=`<text x="${x(lo)+9}" y="${y+4}" font-size="10.5" fill="#5B6373" font-family="var(--mono)">${fmtNum(lo)}</text>`;
    }
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width:${W}px">${g}</svg>`;
}

function thermalChart(){
  const L=110, R=20, ROWH=27, TOP=30, W=720;
  const n=THERMAL.length, H=TOP+n*ROWH+16;
  const xmin=-140, xmax=360;
  const x=v=>L+(W-L-R)*(v-xmin)/(xmax-xmin);
  let g="";
  for(let v=-100;v<=350;v+=50){
    const xx=x(v);
    g+=`<line x1="${xx}" y1="${TOP-6}" x2="${xx}" y2="${H-14}" stroke="#E3E5DD"/>`;
    g+=`<text x="${xx}" y="${TOP-10}" font-size="10" text-anchor="middle" fill="#5B6373">${v}</text>`;
  }
  // 23℃（室温）の基準線
  g+=`<line x1="${x(23)}" y1="${TOP-6}" x2="${x(23)}" y2="${H-14}" stroke="#9A6200" stroke-dasharray="4,3"/>`;
  g+=`<text x="${x(23)}" y="${H-2}" font-size="10" text-anchor="middle" fill="#9A6200">23 ℃</text>`;
  g+=`<text x="${W-R}" y="${TOP-10}" font-size="10" text-anchor="end" fill="#5B6373">℃</text>`;
  THERMAL.forEach((r,i)=>{
    const [name,id,g1,g2,m1,m2]=r, y=TOP+i*ROWH+ROWH/2;
    g+=`<text x="${L-8}" y="${y+4}" font-size="11.5" text-anchor="end" fill="#22293B" data-go="m-${id}" style="cursor:pointer" text-decoration="underline" opacity=".9">${name}</text>`;
    // Tg（緑）
    if(g2>g1) g+=`<rect x="${x(g1)}" y="${y-5.5}" width="${Math.max(x(g2)-x(g1),2)}" height="11" rx="5.5" fill="#0E7C66" opacity=".85"/>`;
    else g+=`<circle cx="${x(g1)}" cy="${y}" r="5" fill="#0E7C66" opacity=".9"/>`;
    g+=`<text x="${(x(g1)+x(g2))/2}" y="${y-9}" font-size="9" text-anchor="middle" fill="#0E7C66" font-family="var(--mono)">${tlbl(g1,g2)}</text>`;
    // Tm（紺）
    if(m1!=null){
      if(m2>m1) g+=`<rect x="${x(m1)}" y="${y-5.5}" width="${Math.max(x(m2)-x(m1),2)}" height="11" rx="5.5" fill="#24365E" opacity=".85"/>`;
      else g+=`<circle cx="${x(m1)}" cy="${y}" r="5" fill="#24365E" opacity=".9"/>`;
      g+=`<text x="${(x(m1)+x(m2))/2}" y="${y-9}" font-size="9" text-anchor="middle" fill="#24365E" font-family="var(--mono)">${tlbl(m1,m2)}</text>`;
      g+=`<line x1="${x(g2)+6}" y1="${y}" x2="${x(m1)-6}" y2="${y}" stroke="#C9CCC3" stroke-width="1"/>`;
    }
  });
  // 凡例
  g+=`<circle cx="${L}" cy="${H-6}" r="5" fill="#0E7C66"/><text x="${L+10}" y="${H-2}" font-size="10.5" fill="#5B6373">Tg（ガラス転移）</text>`;
  g+=`<circle cx="${L+120}" cy="${H-6}" r="5" fill="#24365E"/><text x="${L+130}" y="${H-2}" font-size="10.5" fill="#5B6373">Tm（融点・結晶性のみ）</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width:${W}px">${g}</svg>`;
}

const MFR_CHART = [
 ["PEEK","peek",380,5,"高温対応の炉・ダイが必要"],
 ["PC","pc",300,1.2],["PET","pet",280,2.16],["PBT","pbt",250,2.16],
 ["PP","pp",230,2.16],["PMMA","pmma",230,3.8],["ABS","abs",220,10],
 ["PS","ps",200,5],["PE","pe",190,2.16,"HLMFR: 190 ℃ / 21.6 kg"],["POM","pom",190,2.16]
];
function mfrChart(){
  const L=110, R=190, ROWH=28, TOP=30, W=760;
  const n=MFR_CHART.length, H=TOP+n*ROWH+16;
  const xmin=170, xmax=410;
  const x=v=>L+(W-L-R)*(v-xmin)/(xmax-xmin);
  const rad=w=>4+2.2*Math.log(w);
  let g="";
  for(let v=180;v<=400;v+=20){
    g+=`<line x1="${x(v)}" y1="${TOP-6}" x2="${x(v)}" y2="${H-14}" stroke="#E3E5DD"/>`;
    g+=`<text x="${x(v)}" y="${TOP-10}" font-size="10" text-anchor="middle" fill="#5B6373">${v}</text>`;
  }
  g+=`<text x="${W-R+8}" y="${TOP-10}" font-size="10" fill="#5B6373">℃ ｜ 条件</text>`;
  MFR_CHART.forEach((r,i)=>{
    const [name,id,t,w,extra]=r, y=TOP+i*ROWH+ROWH/2;
    g+=`<text x="${L-8}" y="${y+4}" font-size="11.5" text-anchor="end" fill="#22293B" data-go="m-${id}" style="cursor:pointer" text-decoration="underline" opacity=".9">${name}</text>`;
    g+=`<circle cx="${x(t)}" cy="${y}" r="${rad(w)}" fill="#24365E" opacity=".8"/>`;
    g+=`<text x="${W-R+8}" y="${y+4}" font-size="10.5" fill="#22293B" font-family="var(--mono)">${t} ℃ / ${w} kg${extra?`<tspan fill="#9A6200">（${extra}）</tspan>`:""}</text>`;
  });
  g+=`<text x="${L}" y="${H-2}" font-size="10.5" fill="#5B6373">円の大きさ＝試験荷重（1.2〜10 kg）。JIS K 7210-1 の代表条件。</text>`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width:${W}px">${g}</svg>`;
}

function chartCard(title, svg, note){
  return `<div class="card open" data-kind="chart">
    <div class="card-hd"><span class="badge m-badge">図</span><span class="card-title">${title}</span><span class="chev">▶</span></div>
    <div class="card-body"><div class="blk">${svg}</div>${note?`<div class="note">${note}</div>`:""}</div>
  </div>`;
}

function renderCharts(){
  let html = `<div class="sec-label">基本データの材料間比較（代表値・グレードで変動）</div>`;
  for(const c of CHARTS) html += chartCard(c.title, rangeChart(c), c.note||"");
  html += chartCard("熱的性質：Tg・Tm（代表値）", thermalChart(),
    "非晶性樹脂はTgが実用上限の目安、結晶性樹脂はTgを超えてもTm付近まで形状を保持します。材料名クリックで各材料カードへ移動できます。");
  html += `<div class="sec-label">ゴム材料の比較（代表値・配合で大きく変動）</div>`;
  for(const c of RUBBER_CHARTS) html += chartCard(c.title, rangeChart(c), c.note||"");
  html += `<div class="sec-label">成形・試験条件の比較（代表値）</div>`;
  html += chartCard("試験片成形条件：溶融温度・金型温度・事前乾燥（各材料規格 第2部＋手順 JIS K 7152-1）", moldChart(),
    "溶融温度・金型温度は各材料の第2部 表1の実値（PP→K 6921-2、PE→K 6922-2、PS→K 6923-2、ABS→K 6934-2、PMMA→K 6717-2、PC→K 6719-2、PA→K 6920-2、POM→K 7364-2、PBT・PET→K 6937-2）。PP・PC・PA・PMMAはMFR/MVR・粘度数・グレードで溶融温度が区分される（バーは規格値の範囲）。PVCは射出成形の第2部規格がなく圧縮成形（実務レンジを参考表示）。PETの金型温度は非晶（20 ℃）と結晶化（110〜135 ℃）の2水準。射出速度・保圧・サイクル等の詳細は各材料カードを参照。");
  html += chartCard("MFR測定条件：温度×荷重（JIS K 7210-1）", mfrChart(),
    "硬質PVCは熱分解（HCl発生）のため通常測定しない。PA6/PA66・PET・PBT・PCは測定前乾燥が必須（加水分解・水分でMFRが増大）。GF強化材は繊維折損・目詰まりのため参考値扱いが無難。");
  return html;
}

/* ================= クイックインデックス ================= */
/* プラスチック試験の分類（ナビゲーション用・未分類は「その他」へ） */
const TEST_GROUPS = [
  {label:"力学特性", ids:["tensile","film-tensile","flex","compress","charpy","izod","tensile-impact","puncture","creep-tensile","hardness-r","hardness-d"]},
  {label:"熱的特性", ids:["hdt","vicat","dsc","tg","tma","cp","oit"]},
  {label:"流動・物理・成形", ids:["mfr","density","water","molding","shrinkage","ash"]},
  {label:"難燃・光学", ids:["flammability","loi","haze"]}
];

function idxChip(id, label, cls){
  return `<button class="idx-chip ${cls||""}" data-go="${id}" title="${esc(label)}">${esc(label)}</button>`;
}
function matLabel(m){ return m.name.split("（")[0]; }

function renderIndex(){
  const pT = TESTS.filter(t=>t.cat!=="rubber"), rT = TESTS.filter(t=>t.cat==="rubber");
  const pM = MATS.filter(m=>m.cat!=="rubber"), rM = MATS.filter(m=>m.cat==="rubber");
  const grouped = new Set();

  let testCol = "";
  if(view!=="mat"){
    for(const g of TEST_GROUPS){
      const items = g.ids.map(id=>pT.find(t=>t.id===id)).filter(Boolean);
      items.forEach(t=>grouped.add(t.id));
      if(!items.length) continue;
      testCol += `<div class="idx-grp"><div class="idx-h">${esc(g.label)}</div><div class="idx-chips">`
        + items.map(t=>idxChip("t-"+t.id, t.name)).join("") + `</div></div>`;
    }
    const other = pT.filter(t=>!grouped.has(t.id));
    if(other.length){
      testCol += `<div class="idx-grp"><div class="idx-h">その他</div><div class="idx-chips">`
        + other.map(t=>idxChip("t-"+t.id, t.name)).join("") + `</div></div>`;
    }
    if(rT.length){
      testCol += `<div class="idx-grp"><div class="idx-h rub">ゴム試験</div><div class="idx-chips">`
        + rT.map(t=>idxChip("t-"+t.id, t.name, "rub")).join("") + `</div></div>`;
    }
  }

  let matCol = "";
  if(view!=="test"){
    if(pM.length){
      matCol += `<div class="idx-grp"><div class="idx-h">材料：プラスチック</div><div class="idx-chips">`
        + pM.map(m=>idxChip("m-"+m.id, matLabel(m), "mat")).join("") + `</div></div>`;
    }
    if(rM.length){
      matCol += `<div class="idx-grp"><div class="idx-h rub">材料：ゴム</div><div class="idx-chips">`
        + rM.map(m=>idxChip("m-"+m.id, matLabel(m), "rub")).join("") + `</div></div>`;
    }
  }

  const cols = [matCol, testCol].filter(Boolean);
  const grid = cols.length===2
    ? `<div class="idx-cols"><div>${matCol}</div><div>${testCol}${
        `<div class="idx-grp"><div class="idx-h">グラフ</div><button class="idx-chart" data-view="chart">物性・条件の比較グラフを見る →</button></div>`}</div></div>`
    : `<div class="idx-cols" style="grid-template-columns:1fr">${cols.join("")}`
      + `<div class="idx-grp"><div class="idx-h">グラフ</div><button class="idx-chart" data-view="chart">物性・条件の比較グラフを見る →</button></div></div>`;

  return `<div class="idx">
    <div class="idx-hint">項目名をクリックすると該当カードを開いて移動します。上部の検索窓でキーワード（規格番号・略称・試験名）による絞り込みもできます。</div>
    ${grid}
  </div>`;
}

function render(){
  const qn = norm(query);
  rawWords = query.trim().split(/[\s　]+/).filter(Boolean);
  const words = qn ? qn.split(/\s+/).filter(Boolean) : [];
  const matchT = TESTS.filter(t => !qn || testHay(t).includes(qn) || rawWords.every(w=>testHay(t).includes(norm(w))));
  const matchM = MATS.filter(m => !qn || matHay(m).includes(qn) || rawWords.every(w=>matHay(m).includes(norm(w))));

  if(view==="chart"){
    $("#idx").innerHTML = "";
    $("#list").innerHTML = renderCharts();
    $("#count").textContent = `グラフ： ${CHARTS.length+RUBBER_CHARTS.length+3} 図（代表値ベース）`;
    document.querySelector(".tools").style.display = "none";
    return;
  }
  document.querySelector(".tools").style.display = "";
  $("#idx").innerHTML = query ? "" : renderIndex();

  const pT = matchT.filter(t=>t.cat!=="rubber"), rT = matchT.filter(t=>t.cat==="rubber");
  const pM = matchM.filter(m=>m.cat!=="rubber"), rM = matchM.filter(m=>m.cat==="rubber");
  const sect = (label, arr, fn) => arr.length ? `<div class="sec-label">${label}（${arr.length}）</div>` + arr.map(fn).join("") : "";

  let html = "";
  if(view!=="test"){
    html += sect("材料：プラスチック", pM, renderMat);
    html += sect("材料：ゴム", rM, renderMat);
    if(!matchM.length) html += `<div class="sec-label">材料（0）</div><div class="empty" style="padding:16px 0">該当する材料はありません</div>`;
  }
  if(view!=="mat"){
    html += sect("試験方法：プラスチック", pT, renderTest);
    html += sect("試験方法：ゴム", rT, renderTest);
    if(!matchT.length) html += `<div class="sec-label">試験方法（0）</div><div class="empty" style="padding:16px 0">該当する試験方法はありません</div>`;
  }
  if(!matchT.length && !matchM.length){
    html = `<div class="empty">「${esc(query)}」に一致する項目がありません。<br>別のキーワード（規格番号・略称・試験名など）を試してください。</div>`;
  }
  $("#list").innerHTML = html;
  $("#count").textContent = query
    ? `検索「${query}」： 材料 ${matchM.length} 件 / 試験方法 ${matchT.length} 件`
    : `収録： 材料 ${MATS.length} 件 / 試験方法 ${TESTS.length} 件`;

  // 検索時は自動展開
  if(query) document.querySelectorAll(".card").forEach(c=>c.classList.add("open"));
}

/* ================= イベント ================= */
$("#q").addEventListener("input", e=>{ query = e.target.value; render(); });

$("#seg").addEventListener("click", e=>{
  const b = e.target.closest("button"); if(!b) return;
  view = b.dataset.v;
  document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on", x===b));
  render();
});

function goToCard(id){
  // 移動先が現在のビューに無い場合は「すべて」に切替
  let el = document.getElementById(id);
  if(!el){
    view = "all"; query = ""; $("#q").value = "";
    document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on", x.dataset.v==="all"));
    render();
    el = document.getElementById(id);
  }
  if(el){
    el.classList.add("open","hit-flash");
    el.scrollIntoView({behavior:"smooth", block:"start"});
    setTimeout(()=>el.classList.remove("hit-flash"), 1700);
  }
}

$("#list").addEventListener("click", e=>{
  const go = e.target.closest("[data-go]");
  if(go){ goToCard(go.dataset.go); e.stopPropagation(); return; }
  const hd = e.target.closest(".card-hd");
  if(hd) hd.parentElement.classList.toggle("open");
});

$("#idx").addEventListener("click", e=>{
  const v = e.target.closest("[data-view]");
  if(v){
    view = v.dataset.view;
    document.querySelectorAll("#seg button").forEach(x=>x.classList.toggle("on", x.dataset.v===view));
    render();
    window.scrollTo({top:0, behavior:"smooth"});
    return;
  }
  const go = e.target.closest("[data-go]");
  if(go) goToCard(go.dataset.go);
});

$("#openAll").addEventListener("click", ()=>document.querySelectorAll(".card").forEach(c=>c.classList.add("open")));
$("#closeAll").addEventListener("click", ()=>document.querySelectorAll(".card").forEach(c=>c.classList.remove("open")));

/* 上に戻る */
const toTop = $("#toTop");
window.addEventListener("scroll", ()=>{ toTop.classList.toggle("show", window.scrollY > 400); }, {passive:true});
toTop.addEventListener("click", ()=>window.scrollTo({top:0, behavior:"smooth"}));

render();
</script>
</body>
</html>
